name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: |
          python -m pytest -q -n auto --dist=loadscope --splits 3 --group ${{ matrix.group }}

  coverage:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
      COVERAGE_FILE: ".coverage.${{ matrix.group }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Coverage shard
        run: |
          python -m pytest -q -n auto --dist=loadscope --splits 3 --group ${{ matrix.group }} --cov=sfincs_jax --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.group }}
          path: .coverage.${{ matrix.group }}
          if-no-files-found: error

  coverage-report:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: coverage
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-parts
      - name: Combine coverage
        run: |
          python -m coverage combine $(find coverage-parts -type f -name '.coverage.*' | sort)
          python -m coverage report --fail-under=43
          python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          use_oidc: true

  examples-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Smoke-run examples (no optional deps)
        run: |
          python examples/getting_started/build_grids_and_geometry.py
          python examples/getting_started/apply_collisionless_operator.py
          python examples/getting_started/write_sfincs_output_python.py
          python examples/getting_started/write_sfincs_output_cli.py
          python examples/getting_started/plot_sfincs_output.py
          python examples/parity/write_output_upstream_quick2species_python.py
          python examples/parity/write_output_upstream_quick2species_cli.py
          python examples/parity/geometry_scheme4_parity.py
          python examples/parity/collisionless_operator_matvec_parity.py
          python examples/autodiff/differentiable_geometry_gradients.py
          python examples/parity/solve_fortran_matrix_with_gmres.py
          python examples/parity/output_parity_cli_driver.py
          python examples/parity/output_key_coverage_report.py
          python examples/autodiff/matrix_free_residual_and_jvp.py
          python examples/parity/solve_scheme5_tiny_parity.py
          python examples/autodiff/autodiff_sensitivity_nu_n_scheme5.py

  optional-ecosystem-gates:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install lineax equinox jaxopt
      - name: Optional ecosystem benchmark gates
        run: |
          python -m pytest -q \
            tests/test_optional_lineax_implicit_gate.py \
            tests/test_optional_eqx_jaxopt_scheme4_gate.py
