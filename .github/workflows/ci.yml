name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
      COVERAGE_FILE: ".coverage.${{ matrix.group }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "solvax @ git+https://github.com/uwplasma/SOLVAX.git"
      - name: Fetch external equilibrium data
        run: |
          python -m sfincs_jax.validation.data_fetch --quiet
      - name: Coverage shard
        run: |
          python -m pytest -q -n auto --dist=loadscope --splits 4 --group ${{ matrix.group }} --splitting-algorithm least_duration --cov=sfincs_jax --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.group }}
          path: .coverage.${{ matrix.group }}
          if-no-files-found: error
          include-hidden-files: true

  coverage-report:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: coverage
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install "coverage[toml]"
      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-parts
      - name: Combine coverage
        run: |
          python -m coverage combine $(find coverage-parts -type f -name '.coverage.*' | sort)
          python -m coverage report --fail-under=80
          python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          use_oidc: true

  examples-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
      - name: Fetch external equilibrium data
        run: |
          python -m sfincs_jax.validation.data_fetch --quiet
      - name: Smoke-run examples (no optional deps)
        env:
          SFINCS_JAX_OFFLINE: "1"
        run: |
          python examples/getting_started/build_grids_and_geometry.py
          python examples/getting_started/apply_collisionless_operator.py
          python examples/getting_started/write_sfincs_output_python.py
          python examples/getting_started/write_sfincs_output_cli.py
          python examples/getting_started/write_sfincs_output_vmec.py --out "${RUNNER_TEMP}/sfincsOutput_vmec_release_data.h5"
          python examples/getting_started/plot_sfincs_output.py
          python examples/tutorials/run_quick_output_and_plot.py --out-dir "${RUNNER_TEMP}/sfincs_jax_tutorial_output"
          python examples/parity/write_output_upstream_quick2species_python.py
          python examples/parity/write_output_upstream_quick2species_cli.py
          python examples/parity/geometry_scheme4_parity.py
          python examples/parity/collisionless_operator_matvec_parity.py
          python examples/autodiff/differentiable_geometry_gradients.py
          python examples/parity/solve_fortran_matrix_with_gmres.py
          python examples/parity/output_parity_cli_driver.py
          python examples/parity/output_key_coverage_report.py
          python examples/autodiff/matrix_free_residual_and_jvp.py
          python examples/parity/solve_scheme5_tiny_parity.py
          python examples/autodiff/autodiff_sensitivity_nu_n_scheme5.py

  external-data-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "solvax @ git+https://github.com/uwplasma/SOLVAX.git"
      - name: Fetch release-hosted equilibrium data
        env:
          SFINCS_JAX_DATA_DIR: "${{ runner.temp }}/sfincs_jax_release_data"
        run: |
          python -m sfincs_jax.validation.data_fetch --quiet
      - name: Verify release data in offline mode
        env:
          SFINCS_JAX_DATA_DIR: "${{ runner.temp }}/sfincs_jax_release_data"
          SFINCS_JAX_OFFLINE: "1"
        run: |
          python - <<'PY'
          from pathlib import Path

          from sfincs_jax.validation.data_fetch import external_data_dir, external_data_manifest

          root = external_data_dir()
          manifest = external_data_manifest()
          missing = [item["path"] for item in manifest["files"] if not (root / item["path"]).exists()]
          if missing:
              raise SystemExit(f"Missing release-hosted data files after fetch: {missing}")
          print(f"Release-hosted equilibrium data ready in {root}")
          PY
          python -m pytest -q \
            tests/test_data_fetch.py::test_external_data_manifest_lists_release_fixtures \
            tests/test_data_fetch.py::test_unknown_external_equilibrium_does_not_fetch \
            tests/test_write_output_return_results.py::test_write_output_wout_path_override_resolves_missing_scheme5_input
          python examples/getting_started/write_sfincs_output_vmec.py --out "${RUNNER_TEMP}/sfincsOutput_vmec_release_data.h5"
          test -s "${RUNNER_TEMP}/sfincsOutput_vmec_release_data.h5"

  optional-ecosystem-gates:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      JAX_ENABLE_X64: "True"
      JAX_DISABLE_JIT: "0"
      SFINCS_JAX_SOLVER_JIT: "1"
      SFINCS_JAX_PRECOMPILE: "0"
      SFINCS_JAX_PROFILE: "0"
      SFINCS_JAX_CI: "1"
      SFINCS_JAX_FAST_EXAMPLES: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "solvax @ git+https://github.com/uwplasma/SOLVAX.git"
          pip install lineax equinox
      - name: Optional ecosystem benchmark gates
        run: |
          python -m pytest -q \
            tests/test_optional_lineax_implicit_gate.py \
            tests/test_optional_eqx_jaxopt_scheme4_gate.py

  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs:
      - coverage-report
      - examples-smoke
      - external-data-smoke
      - optional-ecosystem-gates
    if: always()
    steps:
      - name: Check required CI jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: data.get("result")
              for name, data in needs.items()
              if data.get("result") != "success"
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("All required CI jobs passed.")
          PY
