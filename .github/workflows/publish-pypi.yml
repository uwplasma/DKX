name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate release metadata
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          init_text = Path("sfincs_jax/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not find sfincs_jax.__version__")
          init_version = match.group(1)
          if pyproject_version != init_version:
              raise SystemExit(f"Version mismatch: pyproject={pyproject_version}, __init__={init_version}")

          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          if ref_type == "tag" and ref_name != f"v{pyproject_version}":
              raise SystemExit(f"Tag {ref_name!r} does not match package version v{pyproject_version}")
          print(f"validated package version {pyproject_version}")
          PY
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
