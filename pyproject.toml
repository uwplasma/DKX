[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sfincs_jax"
version = "1.1.3"
description = "Neoclassical transport solver with CPU/GPU and differentiable JAX workflows"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "jax",
  "numpy",
  "scipy",
  "h5py",
  "netCDF4",
  "matplotlib",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "pytest-split",
]
docs = [
  "sphinx",
  "sphinx-rtd-theme",
]

[project.scripts]
sfincs_jax = "sfincs_jax.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["sfincs_jax*"]

[tool.setuptools.package-data]
sfincs_jax = ["data/**"]

[tool.pytest.ini_options]
addopts = ["--import-mode=prepend"]
testpaths = ["tests"]

[tool.ruff.lint.per-file-ignores]
# v3_driver.py is the compatibility monolith under active extraction. Keep
# release lint strict for new split modules while allowing the existing import
# ordering, legacy l-index names, and staged fallback branches until they move
# behind focused policy modules.
"sfincs_jax/v3_driver.py" = ["E402", "E741", "F401", "F841", "E731"]
