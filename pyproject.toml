[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sfincs_jax"
version = "1.1.7"
description = "Neoclassical transport solver with CPU/GPU and differentiable JAX workflows"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "jax",
  "numpy",
  "scipy",
  "h5py",
  "netCDF4",
  "matplotlib",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "pytest-split",
]
docs = [
  "sphinx",
  "sphinx-rtd-theme",
]

[project.scripts]
sfincs_jax = "sfincs_jax.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["sfincs_jax*"]

[tool.setuptools.package-data]
sfincs_jax = ["validation/*.json"]

[tool.pytest.ini_options]
addopts = ["--import-mode=prepend"]
testpaths = ["tests"]

[tool.ruff.lint.per-file-ignores]
# The solve owners below are mechanical extractions from the former v3_driver
# monolith. Iteration 5 removes stale imports/private dynamic-globals and brings
# them back under normal lint. Keep the rest of the package strict during the
# ownership move.
"sfincs_jax/problems/profile_solve.py" = ["E402", "E731", "E741", "F401", "F811", "F821", "F841"]
"sfincs_jax/problems/transport_solve.py" = ["E402", "E731", "E741", "F401", "F811", "F821", "F841"]
"sfincs_jax/v3_driver.py" = ["E402", "E731", "E741", "F401", "F811", "F821", "F841"]
"sfincs_jax/v3_system.py" = ["E402", "E741"]
