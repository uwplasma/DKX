[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sfincs_jax"
version = "1.0.6"
description = "Neoclassical transport solver with CPU/GPU and differentiable JAX workflows"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "jax",
  "numpy",
  "scipy",
  "h5py",
  "matplotlib",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "pytest-split",
]
docs = [
  "sphinx",
  "sphinx-rtd-theme",
]

[project.scripts]
sfincs_jax = "sfincs_jax.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["sfincs_jax*"]

[tool.setuptools.package-data]
sfincs_jax = ["data/**"]

[tool.pytest.ini_options]
addopts = ["--import-mode=prepend"]
testpaths = ["tests"]
